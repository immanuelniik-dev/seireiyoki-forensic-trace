      <text x="0" y="5" font-family="Verdana, sans-serif" font-size="20" font-weight="bold" fill="#1c417c" text-anchor="middle" letter-spacing="1">AUDITED &amp; VERIFIED</text>
      <text x="0" y="32" font-family="Verdana, sans-serif" font-size="12" font-weight="bold" fill="#1c417c" text-anchor="middle">LAGOS, NIGERIA</text>
    </g>

